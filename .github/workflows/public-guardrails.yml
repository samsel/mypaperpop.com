name: Public Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-boundaries:
    name: Public boundaries and smoke checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Check repository boundaries before install
        run: node scripts/check-repo-boundaries.mjs

      - name: Secret scan with Gitleaks
        run: docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.30.1 detect --no-git --source /repo --redact --verbose

      - name: Secret scan with TruffleHog
        run: docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:3.95.6 filesystem /repo --no-update --no-color --fail

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check repository boundaries
        run: pnpm check:boundaries

      - name: Check optional internal overlay status
        run: pnpm internal:check

      - name: Prepare smoke-test environment
        run: cp .env.example .env

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm test:unit

      - name: Build
        run: pnpm build
